aid: uspto-trademark-search-api
name: USPTO Trademark Search API
description: >-
  Instant trademark search and brand protection via the USPTO Trademark Search API.
  Check if a trademark keyword is available, search active trademarks, look up marks
  by serial number, and search by owner from United States Patent and Trademark Office
  data. Updated daily. Enables trademark availability checking, portfolio research,
  competitive intelligence, and due diligence workflows.
