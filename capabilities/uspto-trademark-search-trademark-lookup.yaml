naftiko: 1.0.0-alpha2
info:
  label: USPTO Trademark Search API — Trademark Lookup
  description: 'USPTO Trademark Search API — Trademark Lookup. 1 operations. Lead operation: Get Trademark by Serial Number.
    Self-contained Naftiko capability covering one Uspto Trademark Search Api business surface.'
  tags:
  - Uspto Trademark Search Api
  - Trademark Lookup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    USPTO_TRADEMARK_SEARCH_API_API_KEY: USPTO_TRADEMARK_SEARCH_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: uspto-trademark-search-trademark-lookup
    baseUri: https://uspto-trademark.p.rapidapi.com
    description: USPTO Trademark Search API — Trademark Lookup business capability. Self-contained, no shared references.
    resources:
    - name: v1-trademarkBySerial-serialNumber
      path: /v1/trademarkBySerial/{serialNumber}
      operations:
      - name: gettrademarkbyserialnumber
        method: GET
        description: Get Trademark by Serial Number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: serialNumber
          in: path
          type: string
          description: The USPTO trademark serial number (8 digits)
          required: true
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.USPTO_TRADEMARK_SEARCH_API_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: uspto-trademark-search-trademark-lookup-rest
    port: 8080
    description: REST adapter for USPTO Trademark Search API — Trademark Lookup. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/trademarkbyserial/{serialnumber}
      name: v1-trademarkbyserial-serialnumber
      description: REST surface for v1-trademarkBySerial-serialNumber.
      operations:
      - method: GET
        name: gettrademarkbyserialnumber
        description: Get Trademark by Serial Number
        call: uspto-trademark-search-trademark-lookup.gettrademarkbyserialnumber
        with:
          serialNumber: rest.serialNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: uspto-trademark-search-trademark-lookup-mcp
    port: 9090
    transport: http
    description: MCP adapter for USPTO Trademark Search API — Trademark Lookup. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-trademark-serial-number
      description: Get Trademark by Serial Number
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uspto-trademark-search-trademark-lookup.gettrademarkbyserialnumber
      with:
        serialNumber: tools.serialNumber
      outputParameters:
      - type: object
        mapping: $.
